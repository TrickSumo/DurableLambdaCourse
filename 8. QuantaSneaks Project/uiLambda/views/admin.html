<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — QuantaSneaks</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #050510;
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            padding: 90px 48px 48px;
        }
        nav {
            position: fixed;
            top: 0; width: 100%;
            padding: 16px 48px;
            display: flex;
            align-items: center;
            gap: 14px;
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(100,200,255,0.08);
            z-index: 100;
        }
        nav img { height: 36px; }
        .nav-sep { color: rgba(255,255,255,0.15); }
        .nav-label { font-size: 13px; color: rgba(255,255,255,0.35); letter-spacing: 1px; }

        h1 { font-size: 26px; font-weight: 800; margin-bottom: 6px; }
        .subtitle { font-size: 13px; color: rgba(255,255,255,0.35); margin-bottom: 36px; }

        table { width: 100%; border-collapse: collapse; }

        th {
            text-align: left;
            padding: 10px 16px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255,255,255,0.3);
            border-bottom: 1px solid rgba(255,255,255,0.07);
        }

        td {
            padding: 16px;
            font-size: 14px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            vertical-align: middle;
        }

        tr:hover td { background: rgba(255,255,255,0.015); }

        .mono { font-family: monospace; font-size: 13px; color: rgba(255,255,255,0.5); }

        .risk {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .risk-low    { background: rgba(34,197,94,0.15);  color: #22c55e; border: 1px solid rgba(34,197,94,0.25); }
        .risk-medium { background: rgba(251,191,36,0.15); color: #fbbf24; border: 1px solid rgba(251,191,36,0.25); }
        .risk-high   { background: rgba(239,68,68,0.15);  color: #ef4444; border: 1px solid rgba(239,68,68,0.25); }

        .btn-approve, .btn-reject {
            border: none;
            padding: 8px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: opacity 0.2s, transform 0.15s;
        }

        .btn-approve {
            background: rgba(34,197,94,0.15);
            color: #22c55e;
            border: 1px solid rgba(34,197,94,0.25);
            margin-right: 8px;
        }

        .btn-approve:hover { background: rgba(34,197,94,0.25); transform: translateY(-1px); }

        .btn-reject {
            background: rgba(239,68,68,0.15);
            color: #ef4444;
            border: 1px solid rgba(239,68,68,0.25);
        }

        .btn-reject:hover { background: rgba(239,68,68,0.25); transform: translateY(-1px); }

        .empty {
            text-align: center;
            color: rgba(255,255,255,0.2);
            padding: 64px 16px;
            font-size: 14px;
        }

        .refresh {
            float: right;
            background: rgba(100,200,255,0.08);
            border: 1px solid rgba(100,200,255,0.2);
            color: #64c8ff;
            padding: 8px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }

        .refresh:hover { background: rgba(100,200,255,0.15); }
    </style>
</head>
<body>
    <nav>
        <img src="?asset=logo.png" alt="QuantaSneaks">
        <span class="nav-sep">/</span>
        <span class="nav-label">Admin Panel</span>
    </nav>

    <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px">
        <h1>Pending Approvals</h1>
        <button class="refresh" onclick="location.reload()">↻ Refresh</button>
    </div>
    <p class="subtitle">Review AI risk assessments and approve or reject each order</p>

    <table>
        <thead>
            <tr>
                <th>Order ID</th>
                <th>Size</th>
                <th>Risk Level</th>
                <th>AI Assessment</th>
                <th>Submitted</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>{{ROWS}}</tbody>
    </table>

    <script>
        async function decide(orderId, action) {
            const row = event.target.closest('tr');
            row.style.opacity = '0.4';
            row.querySelectorAll('button').forEach(b => b.disabled = true);

            await fetch(`?action=${action}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ orderId })
            });

            setTimeout(() => location.reload(), 800);
        }
    </script>
</body>
</html>
